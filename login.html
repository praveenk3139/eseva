<!DOCTYPE html>
<html>
<head>
  <title>Cop Friendly e-Seva - Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      text-align: center;
      width: 300px;
    }

    h2 {
      margin-bottom: 25px;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
      border-radius: 5px;
      border: none;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 25px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }
  </style>

</head>
<body>

  <div class="container">
    <h2> Login</h2>

    <form action="login.php" method="post">
      Email:<br>
      <input type="email" name="email" required><br>

      Password:<br>
      <input type="password" name="password" required><br>

      <button type="submit" class="btn">Login</button>
    </form>
  </div>

</body>
</html>
